<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>个股同行分析</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #f7f8fa;
    color: #333;
    padding: 20px;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 30px;
  }
  .input-section {
    margin-bottom: 30px;
    padding-bottom: 30px;
    border-bottom: 2px solid #c10000;
  }
  .input-section h1 {
    font-size: 22px;
    color: #333;
    margin-bottom: 20px;
    text-align: center;
  }
  .input-group {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }
  .input-group .label {
    width: 60px;
    font-size: 14px;
    color: #666;
    text-align: right;
    padding-right: 12px;
    flex-shrink: 0;
  }
  .input-group input {
    flex: 1;
    height: 38px;
    padding: 0 12px;
    border: 1px solid #e5e5e5;
    border-radius: 4px;
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    outline: none;
    border-color: #c10000;
  }
  .input-group .remove-btn {
    width: 38px;
    height: 38px;
    margin-left: 8px;
    border: none;
    background: #f5f5f5;
    color: #999;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
  }
  .input-group .remove-btn:hover {
    background: #ffecec;
    color: #c10000;
  }
  .add-btn {
    display: block;
    width: 100%;
    height: 38px;
    margin-top: 12px;
    border: 1px dashed #d5d5d5;
    background: #fff;
    color: #666;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .add-btn:hover {
    border-color: #c10000;
    color: #c10000;
  }
  .year-select-group {
    margin-top: 20px;
    margin-bottom: 20px;
    padding-top: 20px;
    border-top: 1px dashed #e5e5e5;
  }
  .year-select-group .label {
    display: block;
    font-size: 14px;
    color: #666;
    margin-bottom: 12px;
  }
  .year-options {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .year-option {
    padding: 8px 20px;
    border: 1px solid #e5e5e5;
    border-radius: 4px;
    background: #fff;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .year-option:hover {
    border-color: #c10000;
    color: #c10000;
  }
  .year-option.active {
    background: #c10000;
    color: #fff;
    border-color: #c10000;
  }
  .submit-btn {
    display: block;
    width: 100%;
    height: 44px;
    margin-top: 10px;
    background: #c10000;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    transition: background 0.2s;
  }
  .submit-btn:hover {
    background: #a50000;
  }
  .submit-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .tips {
    margin-top: 16px;
    padding: 12px 16px;
    background: #fff8e1;
    border-radius: 4px;
    font-size: 12px;
    color: #8a5a00;
    line-height: 1.6;
  }
  .error-msg {
    margin-top: 12px;
    padding: 12px;
    background: #ffecec;
    border-radius: 4px;
    font-size: 13px;
    color: #c10000;
    display: none;
  }
  .result-section {
    display: none;
  }
  .result-section.show {
    display: block;
  }
  .loading {
    text-align: center;
    padding: 40px 0;
    color: #999;
  }
  .loading .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #c10000;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .result-content h2 {
    font-size: 20px;
    color: #333;
    margin-bottom: 20px;
    text-align: center;
  }
  .result-content h3 {
    font-size: 16px;
    color: #c10000;
    margin-top: 24px;
    margin-bottom: 12px;
  }
  .result-content h4 {
    font-size: 15px;
    color: #333;
    margin-top: 16px;
    margin-bottom: 8px;
  }
  .result-content p {
    line-height: 1.8;
    margin-bottom: 12px;
    font-size: 14px;
    color: #333;
  }
  .result-content a {
    color: #c10000;
    text-decoration: none;
  }
  .result-content a:hover {
    text-decoration: underline;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 16px;
  }
  table th, table td {
    border: 1px solid #e5e5e5;
    padding: 8px 12px;
    text-align: right;
  }
  table th:first-child, table td:first-child {
    text-align: left;
    background: #fafafa;
    font-weight: 600;
    width: 120px;
  }
  table th {
    background: #f5f5f5;
    font-weight: 600;
    color: #666;
    white-space: nowrap;
  }
  table tr:nth-child(even) td {
    background: #fafafa;
  }
  .value-num {
    font-family: "Consolas", "Monaco", monospace;
  }
  .value-pct {
    font-family: "Consolas", "Monaco", monospace;
    color: #e50012;
  }
</style>
</head>
<body>
<div class="container">
  <div class="input-section">
    <h1>个股同行分析</h1>
    
    <div id="stock-inputs">
      <div class="input-group">
        <span class="label">股票A</span>
        <input type="text" id="stock-A" placeholder="请输入股票代码，如 000538" maxlength="6" />
        <button class="remove-btn" style="display:none;">×</button>
      </div>
    </div>

    <button class="add-btn" id="add-btn">+ 添加股票</button>

    <div class="year-select-group">
      <span class="label">选择连续年限：</span>
      <div class="year-options">
        <span class="year-option active" data-value="5">5年</span>
        <span class="year-option" data-value="8">8年</span>
        <span class="year-option" data-value="10">10年</span>
        <span class="year-option" data-value="15">15年</span>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn">同行对比</button>

    <div class="error-msg" id="error-msg"></div>

    <div class="tips">
      <strong>提示：</strong>
      <ul>
        <li>支持输入A股股票代码（6位数字），如 000538、600519、300750</li>
        <li>至少输入1只股票，最多支持6只股票对比</li>
        <li>选择年限后，将展示对应年限的年度财务数据</li>
      </ul>
    </div>
  </div>

  <div class="result-section" id="result-section">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>正在获取财务数据...</p>
    </div>
    <div id="result-content" class="result-content" style="display:none;"></div>
  </div>
</div>

<script>
  let inputCount = 1;
  const maxCount = 6;
  const stockLabels = ['A', 'B', 'C', 'D', 'E', 'F'];
  const container = document.getElementById('stock-inputs');
  const addBtn = document.getElementById('add-btn');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  const yearOptions = document.querySelectorAll('.year-option');
  const resultSection = document.getElementById('result-section');
  const loading = document.getElementById('loading');
  const resultContent = document.getElementById('result-content');
  let selectedYears = 5;

  yearOptions.forEach(opt => {
    opt.addEventListener('click', () => {
      yearOptions.forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      selectedYears = parseInt(opt.dataset.value);
    });
  });

  addBtn.addEventListener('click', () => {
    if (inputCount >= maxCount) {
      showError(`最多支持${maxCount}只股票对比`);
      return;
    }
    inputCount++;
    const label = stockLabels[inputCount - 1];
    const div = document.createElement('div');
    div.className = 'input-group';
    div.innerHTML = `
      <span class="label">股票${label}</span>
      <input type="text" id="stock-${label}" placeholder="请输入股票代码" maxlength="6" />
      <button class="remove-btn">×</button>
    `;
    container.appendChild(div);
    div.querySelector('.remove-btn').addEventListener('click', () => {
      div.remove();
      inputCount--;
      reindexInputs();
    });
    if (inputCount >= maxCount) {
      addBtn.style.display = 'none';
    }
  });

  function reindexInputs() {
    const groups = container.querySelectorAll('.input-group');
    groups.forEach((group, index) => {
      const label = group.querySelector('.label');
      const input = group.querySelector('input');
      const removeBtn = group.querySelector('.remove-btn');
      label.textContent = `股票${stockLabels[index]}`;
      input.id = `stock-${stockLabels[index]}`;
      removeBtn.style.display = index === 0 ? 'none' : '';
    });
    inputCount = groups.length;
    addBtn.style.display = inputCount >= maxCount ? 'none' : '';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    setTimeout(() => {
      errorMsg.style.display = 'none';
    }, 3000);
  }

  function formatNumber(val) {
    if (val === null || val === undefined || isNaN(val)) return '-';
    return (val / 1e8).toFixed(2) + ' 亿';
  }

  function formatPercent(val) {
    if (val === null || val === undefined || isNaN(val)) return '-';
    return val.toFixed(2) + '%';
  }

  function renderStockTable(stock, label) {
    let html = `<table>`;
    html += `<thead><tr><th>${stock.name}(${stock.code})</th>`;
    stock.periods.forEach(p => {
      html += `<th>${p}</th>`;
    });
    html += `</tr></thead>`;
    
    html += `<tbody>`;
    html += `<tr><td class="metric-name">总资产</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['资产合计'] && stock.balance_sheet['资产合计'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">总资产增长率</td>`;
    stock.periods.forEach(p => {
      const val = stock.growth_data['资产合计增长率'] && stock.growth_data['资产合计增长率'][p];
      html += `<td class="value-pct">${formatPercent(val)}</td>`;
    });
    html += `</tr>`;
    html += `</tbody></table>`;
    
    return html;
  }

  function renderCompareTable(stocks) {
    if (stocks.length < 2) return '';
    
    let html = '';
    for (let i = 1; i < stocks.length; i++) {
      html += `<p>■ 下面我们看一下${stocks[i].name}的总资产规模及增长率。</p>`;
      html += renderStockTable(stocks[i]);
    }
    return html;
  }

  function renderDebtTable(stock) {
    let html = `<table>`;
    html += `<thead><tr><th>${stock.name}(${stock.code})</th>`;
    stock.periods.forEach(p => {
      html += `<th>${p}</th>`;
    });
    html += `</tr></thead>`;
    
    html += `<tbody>`;
    html += `<tr><td class="metric-name">总资产</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['资产合计'] && stock.balance_sheet['资产合计'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">总负债</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['负债合计'] && stock.balance_sheet['负债合计'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">资产负债率</td>`;
    stock.periods.forEach(p => {
      const total = stock.balance_sheet['资产合计'] && stock.balance_sheet['资产合计'][p];
      const debt = stock.balance_sheet['负债合计'] && stock.balance_sheet['负债合计'][p];
      if (total && debt && total !== 0) {
        const rate = (debt / total * 100);
        html += `<td class="value-pct">${rate.toFixed(2)}%</td>`;
      } else {
        html += `<td class="value-pct">-</td>`;
      }
    });
    html += `</tr>`;
    html += `</tbody></table>`;
    
    return html;
  }

  function renderDebtCompareTable(stocks) {
    if (stocks.length < 2) return '';
    
    let html = '';
    for (let i = 1; i < stocks.length; i++) {
      html += `<p>■ 下面我们看一下${stocks[i].name}的资产负债率。</p>`;
      html += renderDebtTable(stocks[i]);
    }
    return html;
  }

  function renderCashDebtTable(stock) {
    let html = `<table>`;
    html += `<thead><tr><th>${stock.name}(${stock.code})</th>`;
    stock.periods.forEach(p => {
      html += `<th>${p}</th>`;
    });
    html += `</tr></thead>`;
    
    html += `<tbody>`;
    
    html += `<tr><td class="metric-name">货币资金</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['货币资金'] && stock.balance_sheet['货币资金'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">交易性金融资产</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['交易性金融资产'] && stock.balance_sheet['交易性金融资产'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">准货币资金</td>`;
    stock.periods.forEach(p => {
      const cash = stock.balance_sheet['货币资金'] && stock.balance_sheet['货币资金'][p] || 0;
      const trading = stock.balance_sheet['交易性金融资产'] && stock.balance_sheet['交易性金融资产'][p] || 0;
      const val = cash + trading;
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">短期借款</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['短期借款'] && stock.balance_sheet['短期借款'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">一年内到期的非流动负债</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['一年内到期的非流动负债'] && stock.balance_sheet['一年内到期的非流动负债'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">长期借款</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['长期借款'] && stock.balance_sheet['长期借款'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">应付债券</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['应付债券'] && stock.balance_sheet['应付债券'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">长期应付款</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['长期应付款'] && stock.balance_sheet['长期应付款'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">有息负债</td>`;
    stock.periods.forEach(p => {
      const short = stock.balance_sheet['短期借款'] && stock.balance_sheet['短期借款'][p] || 0;
      const current = stock.balance_sheet['一年内到期的非流动负债'] && stock.balance_sheet['一年内到期的非流动负债'][p] || 0;
      const long = stock.balance_sheet['长期借款'] && stock.balance_sheet['长期借款'][p] || 0;
      const bonds = stock.balance_sheet['应付债券'] && stock.balance_sheet['应付债券'][p] || 0;
      const payable = stock.balance_sheet['长期应付款'] && stock.balance_sheet['长期应付款'][p] || 0;
      const val = short + current + long + bonds + payable;
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">偿债风险(准货币-有息负债)</td>`;
    stock.periods.forEach(p => {
      const cash = stock.balance_sheet['货币资金'] && stock.balance_sheet['货币资金'][p] || 0;
      const trading = stock.balance_sheet['交易性金融资产'] && stock.balance_sheet['交易性金融资产'][p] || 0;
      const short = stock.balance_sheet['短期借款'] && stock.balance_sheet['短期借款'][p] || 0;
      const current = stock.balance_sheet['一年内到期的非流动负债'] && stock.balance_sheet['一年内到期的非流动负债'][p] || 0;
      const long = stock.balance_sheet['长期借款'] && stock.balance_sheet['长期借款'][p] || 0;
      const bonds = stock.balance_sheet['应付债券'] && stock.balance_sheet['应付债券'][p] || 0;
      const payable = stock.balance_sheet['长期应付款'] && stock.balance_sheet['长期应付款'][p] || 0;
      const quasi_cash = cash + trading;
      const interest_debt = short + current + long + bonds + payable;
      const val = quasi_cash - interest_debt;
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">有息负债占比总负债</td>`;
    stock.periods.forEach(p => {
      const short = stock.balance_sheet['短期借款'] && stock.balance_sheet['短期借款'][p] || 0;
      const current = stock.balance_sheet['一年内到期的非流动负债'] && stock.balance_sheet['一年内到期的非流动负债'][p] || 0;
      const long = stock.balance_sheet['长期借款'] && stock.balance_sheet['长期借款'][p] || 0;
      const bonds = stock.balance_sheet['应付债券'] && stock.balance_sheet['应付债券'][p] || 0;
      const payable = stock.balance_sheet['长期应付款'] && stock.balance_sheet['长期应付款'][p] || 0;
      const interest_debt = short + current + long + bonds + payable;
      const total_debt = stock.balance_sheet['负债合计'] && stock.balance_sheet['负债合计'][p] || 0;
      if (total_debt !== 0) {
        const rate = (interest_debt / total_debt * 100);
        html += `<td class="value-pct">${rate.toFixed(2)}%</td>`;
      } else {
        html += `<td class="value-pct">-</td>`;
      }
    });
    html += `</tr>`;
    
    html += `<tr><td class="metric-name">有息负债占比总资产</td>`;
    stock.periods.forEach(p => {
      const short = stock.balance_sheet['短期借款'] && stock.balance_sheet['短期借款'][p] || 0;
      const current = stock.balance_sheet['一年内到期的非流动负债'] && stock.balance_sheet['一年内到期的非流动负债'][p] || 0;
      const long = stock.balance_sheet['长期借款'] && stock.balance_sheet['长期借款'][p] || 0;
      const bonds = stock.balance_sheet['应付债券'] && stock.balance_sheet['应付债券'][p] || 0;
      const payable = stock.balance_sheet['长期应付款'] && stock.balance_sheet['长期应付款'][p] || 0;
      const interest_debt = short + current + long + bonds + payable;
      const total_assets = stock.balance_sheet['资产合计'] && stock.balance_sheet['资产合计'][p] || 0;
      if (total_assets !== 0) {
        const rate = (interest_debt / total_assets * 100);
        html += `<td class="value-pct">${rate.toFixed(2)}%</td>`;
      } else {
        html += `<td class="value-pct">-</td>`;
      }
    });
    html += `</tr>`;
    
    html += `</tbody></table>`;
    
    return html;
  }

  function renderCashDebtCompareTable(stocks) {
    if (stocks.length < 2) return '';
    
    let html = '';
    for (let i = 1; i < stocks.length; i++) {
      html += `<p>■ 下面我们看一下${stocks[i].name}的准货币资金减有息负债的差额。</p>`;
      html += renderCashDebtTable(stocks[i]);
    }
    return html;
  }

  function renderCompeteTable(stock) {
    let html = `<table>`;
    html += `<thead><tr><th>${stock.name}(${stock.code})</th>`;
    stock.periods.forEach(p => {
      html += `<th>${p}</th>`;
    });
    html += `</tr></thead>`;
    
    html += `<tbody>`;
    
    html += `<tr><td class="metric-name">应付票据</td>`;
    stock.periods.forEach(p => {
      const val = stock.balance_sheet['应付票据'] && stock.balance_sheet['应付票据'][p];
      html += `<td class="value-num">${formatNumber(val)}</td>`;
    });
    html += `</tr>`;

      html += renderMainProfitCompareTable(stocks);
    }
    
    html += `<p>■ 如果企业在过去${stocks[0].periods.length}年中最近几年的主营利润率大于15%，并且呈上升趋势，说明主业盈利能力在逐步增强。如果主营利润与营业利润的比率一直大于80%，在90%左右，利润质量较高。</p>`;
    html += `<p>在投资实践中，主营利润与营业利润的比率小于80%或主营利润率小于15%的公司，一般淘汰掉，这样的公司不具备持续的竞争力。</p>`;
    
    html += `<h4>〇 第15步，看净利润，了解公司的经营成果及含金量。净利润主要看净利润含金量。</h4>`;
    html += `<p>■ 过去${stocks[0].periods.length}年的平均净利润现金比率小于100%的公司，淘汰掉。</p>`;
    
    html += `<p>■ 下面我们看一下${stocks[0].name}的净利润现金比率。</p>`;
    html += renderNetProfitCashTable(stocks[0]);
    
    html += `<p>■ ${stocks[0].name}过去${stocks[0].periods.length}年的净利润现金比率是否一直大于100%，过去${stocks[0].periods.length}年的平均净利润现金比率如果大于120%，净利润含金量非常高。</p>`;
    
    if (stocks.length > 1) {
      html += `<p>■ 下面我们再进行一下同行对比。</p>`;
      html += renderNetProfitCashCompareTable(stocks);
    }
    
    html += `<h4>〇 第16步，看归母净利润，了解公司的整体盈利能力及持续性。</h4>`;
    html += `<p>■ 归母净利润主要看两点，一是规模，二是增长率。</p>`;
    html += `<p>■ 一般来说，归母净利润规模大的公司盈利能力更强。比如：归母净利润为20亿的公司盈利能力要强于10亿的公司。</p>`;
    html += `<p>■ 归母净利润的增长率也很重要，增长率大于10%，说明公司的盈利能力不但强而且持续性较好。</p>`;
    html += `<p>■ 归母净利润规模较大但增长率小于0的公司，很可能意味公司已经处于衰落之中了，盈利能力的可持续性较差。</p>`;
    html += `<p>■ 在投资实践中，一般把归母净利润增长率小于10%的公司淘汰掉。</p>`;
    html += `<p>■ 用“归母净利润”除以“归母所有者权益”可以得到净资产收益率，也叫ROE。</p>`;
    html += `<p>■ 最优秀公司的ROE一般会持续大于20%，优秀公司的ROE也会持续大于15%。ROE小于15%的公司需要淘汰掉。另外归母净利润增长率持续小于10%的公司也要淘汰掉。</p>`;
    
    html += `<p>■ 下面我们看一下${stocks[0].name}的ROE和归母净利润增长率。</p>`;
    html += renderROETable(stocks[0]);
    
    html += `<p>■ 如果企业过去${stocks[0].periods.length}年的ROE持续维持在30%左右，远大于20%，公司的整体盈利能力非常强。如果归母净利润增长率都大于10%，盈利的持续性也比较强。</p>`;
    
    if (stocks.length > 1) {
      html += `<p>■ 下面我们再进行一下同行对比。</p>`;
      html += renderROECompareTable(stocks);
    }
    
    html += `<p>如果过去${stocks[0].periods.length}年的ROE有2年低于15%，有3年高于15%但低于20%，说明企业的整体盈利能力一般，如果最近3年的盈利能力在增强。归母净利润增长率大于10%，盈利的持续性比较强。</p>`;
    html += `<p>如果过去${stocks[0].periods.length}年的ROE有4年低于15%，说明企业整体盈利能力一般，能给股东带来的长期回报率比较低。</p>`;
    html += `<p>■ 一家公司能给股东带来的长期年化收益率基本上等于长期的ROE，${stocks.length}家公司中哪家公司更有投资价值还是很容易判断的。</p>`;
    
    html += `<h4>〇 第17步，看购买固定资产、无形资产和其他长期资产支付的现金，了解公司的增长潜力。</h4>`;
    html += `<p>■ 购建固定资产、无形资产和其他长期资产支付的现金与经营活动产生的现金流量净额的比率大于100%或持续小于3%的公司需要淘汰掉。这两种类型的公司前者风险较大，后者回报较低。</p>`;
    
    html += `<p>■ 下面我们看一下${stocks[0].name}的购建固定资产、无形资产和其他长期资产支付的现金与经营活动产生的现金流量净额的比率。</p>`;
    html += renderFixedAssetInvestTable(stocks[0]);
    
    html += `<p>如果企业过去${stocks[0].periods.length}年购建固定资产、无形资产和其他长期资产支付的现金与经营活动产生的现金流量净额的比率一直处于3%-40%之间，未来有较大的增长潜力并且风险较小。</p>`;
    
    if (stocks.length > 1) {
      html += `<p>■ 下面我们再进行一下同行对比。</p>`;
      html += renderFixedAssetInvestCompareTable(stocks);
    }
    
    html += `<p>■ 如果企业的购建固定资产、无形资产和其他长期资产支付的现金与经营活动产生的现金流量净额的比率一直处于90%-160%之间，这表明企业在通过融资进行扩张。即使有增长潜力，但也存在一定风险。</p>`;
    
    html += `<h4>〇 第18步，看分红率（也叫股利支付率），了解公司的现金分红情况。</h4>`;
    html += `<p>■ 分红率最好在30%-70%之间，比率小于30%不够厚道，大于70%难以持续。</p>`;
    
    html += `<p>■ 下面我们看一下${stocks[0].name}的分红率，在年报的“第五节 重要事项”可以看到公司的分红率。</p>`;
    html += renderDividendTable(stocks[0]);
    
    html += `<p>■ 企业如果过去${stocks[0].periods.length}年的分红率一直在30%-70%之间，表明在分红方面还是很厚道的，分红的可持续性也很强。</p>`;
    
    if (stocks.length > 1) {
      html += `<p>■ 下面我们再进行一下同行对比。</p>`;
      html += renderDividendCompareTable(stocks);
    }
    
    html += `<p>企业如果过去${stocks[0].periods.length}年的分红在70%-100%之间，表明在分红方面非常厚道，如果是出于成熟期的企业，分红的持续性还是很强的。但是如果是成长期的企业，可持续性就难说了，毕竟企业要成长，都拿来分红了，还怎么成长？</p>`;
    
    if (stocks.length > 1) {
      html += `<p>■ 通过${stocks.length}家公司的分红情况，我们发现哪家最厚道？</p>`;
    }

    html += `<p>■ 通过以上18步，我们就能比较全面的了解一家公司了。如果我们通过这18步去看A股5500多家上市公司，那么至少99%的公司会被淘汰掉。剩下不到1%的公司一般就是非常优秀的公司了，这就叫剩者为王。</p>`;
    html += `<p>以上关于企业分析的内容，仅作为教学案例，帮助大家掌握投资技能，不作为投资建议。</p>`;
    
    return html;
  }

  submitBtn.addEventListener('click', async () => {
    const codes = [];
    for (let i = 0; i < inputCount; i++) {
      const input = document.getElementById(`stock-${stockLabels[i]}`);
      const val = input.value.trim();
      if (val) {
        codes.push(val);
      }
    }
    if (codes.length === 0) {
      showError('请至少输入1只股票代码');
      return;
    }
    if (codes.length > maxCount) {
      showError(`最多支持${maxCount}只股票对比`);
      return;
    }
    const invalid = codes.filter(c => !/^\d{6}$/.test(c));
    if (invalid.length > 0) {
      showError(`股票代码格式不正确：${invalid.join(', ')}`);
      return;
    }
    
    resultSection.classList.add('show');
    loading.style.display = 'block';
    resultContent.style.display = 'none';
    
    try {
      const resp = await fetch(`/api/financial_data?codes=${codes.join(',')}&years=${selectedYears}`);
      const data = await resp.json();
      
      if (data.error) {
        throw new Error(data.error);
      }
      
      resultContent.innerHTML = renderResult(data);
      loading.style.display = 'none';
      resultContent.style.display = 'block';
      
      window.scrollTo({ top: resultSection.offsetTop, behavior: 'smooth' });
      
    } catch (e) {
      loading.style.display = 'none';
      resultContent.innerHTML = `<div class="error-msg">获取数据失败：${e.message}</div>`;
      resultContent.style.display = 'block';
    }
  });
</script>
</body>
</html>
